<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock E-Commerce Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 🛡️ SENTINELWEB FRONTEND TRACKER 🛡️ -->
    <!-- In real scenarios, this is automatically injected or added to <head> -->
    <script src="/sentinel.js"></script>
    <script>
        // Init Tracker tracking to localhost collector
        window.addEventListener('load', () => {
             if(window.SentinelWeb) {
                 window.SentinelWeb.init({
                     endpoint: 'http://localhost:5000/api/collect/frontend',
                     appId: 'sandbox-app',
                     token: 'dev-token',
                     debug: true
                 });
                 console.log('🛡️ SentinelWeb UI Tracker Engaged');
             } else {
                 console.error('SentinelWeb script not loaded properly.');
             }
        });
    </script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans flex flex-col pt-12 items-center">
    <div class="max-w-4xl w-full px-6">
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold tracking-tight text-gray-900">Acme E-Commerce <span class="bg-blue-600 text-white px-2 py-1 rounded text-2xl">Sandbox</span></h1>
            <p class="text-gray-500 mt-2">Intentionally vulnerable test environment protected by SentinelWeb.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- ATTACK VECTOR 1: BRUTE FORCE & SQL INJECTION -->
            <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-200">
                <h3 class="text-lg font-bold border-b pb-2 mb-6">Admin Login Portal</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Username</label>
                        <input type="text" id="username" value="admin" class="mt-1 w-full border border-gray-300 rounded-md py-2 px-3 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" id="password" value="password" class="mt-1 w-full border border-gray-300 rounded-md py-2 px-3 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                    </div>
                    <button onclick="attemptLogin()" class="w-full bg-gray-900 hover:bg-gray-800 text-white font-bold py-2 px-4 rounded transition-colors" id="loginBtn">
                        Sign In
                    </button>
                    <div id="loginStatus" class="mt-4 text-xs font-mono p-2 bg-gray-50 rounded hidden"></div>
                </div>
                
                <div class="mt-6 pt-4 border-t border-gray-100">
                    <p class="text-xs text-gray-400 font-bold uppercase mb-2">Test Vectors:</p>
                    <div class="flex gap-2">
                        <button onclick="simulateBruteForce()" class="bg-orange-100 hover:bg-orange-200 text-orange-800 text-xs px-3 py-1 rounded font-bold transition-transform active:scale-95">🔥 Auto Brute-Force Burst</button>
                        <button onclick="injectSQL()" class="bg-red-100 hover:bg-red-200 text-red-800 text-xs px-3 py-1 rounded font-bold transition-transform active:scale-95">💉 Inject SQL Payload</button>
                    </div>
                </div>
            </div>

            <!-- ATTACK VECTOR 2: RATE LIMIT & XSS -->
            <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-200">
                <h3 class="text-lg font-bold border-b pb-2 mb-6">Product Search</h3>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="searchQuery" placeholder="Search products..." class="flex-1 border border-gray-300 rounded-md py-2 px-3 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                    <button onclick="attemptSearch()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors">
                        Search
                    </button>
                </div>
                <div id="searchResult" class="text-sm text-gray-600 bg-gray-50 p-4 rounded min-h-[100px]">
                    Results will appear here.
                </div>
                
                <div class="mt-6 pt-4 border-t border-gray-100">
                    <p class="text-xs text-gray-400 font-bold uppercase mb-2">Test Vectors:</p>
                    <div class="flex gap-2">
                        <button onclick="simulateXSS()" class="bg-purple-100 hover:bg-purple-200 text-purple-800 text-xs px-3 py-1 rounded font-bold transition-transform active:scale-95">☢️ Inject XSS Payload</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- LOGIC FOR ATTACK ORCHESTRATION ---

        async function attemptLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const status = document.getElementById('loginStatus');
            status.style.display = 'block';
            status.innerHTML = 'Authenticating...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                status.className = data.success ? 'mt-4 text-xs font-mono p-2 rounded bg-green-100 text-green-800' : 'mt-4 text-xs font-mono p-2 rounded bg-red-100 text-red-800';
                status.innerHTML = data.message;
            } catch (e) {
                status.innerHTML = 'Network boundary dropped request (Protected)';
                status.className = 'mt-4 text-xs font-mono p-2 rounded bg-red-100 text-red-800 border border-red-500';
            }
        }

        async function attemptSearch() {
            const q = document.getElementById('searchQuery').value;
            try {
                // Vulnerable search explicitly returning HTML payload verbatim
                const res = await fetch('/api/search?q=' + encodeURIComponent(q));
                const text = await res.text();
                // This intentionally triggers DOM-based XSS mechanisms and backend XSS logging
                document.getElementById('searchResult').innerHTML = text;
            } catch (e) {
                document.getElementById('searchResult').innerHTML = '<span class="text-red-500">Request blocked by Sentinel System.</span>';
            }
        }

        // Action: Auto Brute Force (Fires 10 requests rapidly to trigger Sentinel Behavioral Logic)
        async function simulateBruteForce() {
            let count = 0;
            document.getElementById('password').value = 'wrongpassword';
            const interval = setInterval(async () => {
                count++;
                await attemptLogin();
                if(count >= 8) clearInterval(interval);
            }, 200); // 5 requests per second
        }

        // Action: SQL Injection (Triggers deterministic RuleEngine)
        function injectSQL() {
            document.getElementById('username').value = "admin' OR 1=1--";
            document.getElementById('password').value = "hack";
            attemptLogin();
        }

        // Action: Cross Site Scripting (XSS)
        function simulateXSS() {
            document.getElementById('searchQuery').value = "<script>alert(document.cookie)</" + "script>";
            attemptSearch();
        }
    </script>
</body>
</html>
